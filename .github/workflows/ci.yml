name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 防止多 PR 同时跑同一个分支
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Type-check + Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: town_store
        ports:
          - 5432:5432
        # 等 postgres 真的 ready 再开始下一步
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/town_store?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Run Prisma migrations
        run: pnpm prisma migrate deploy

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Seed database
        run: pnpm db:seed

      - name: Build
        run: pnpm build

      - name: Start production server
        run: |
          nohup pnpm start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          # 给 server 启动留点时间
          sleep 5

      - name: Wait for server ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/products || echo "000")
            if [ "$code" = "200" ]; then
              echo "Server ready after ${i}*2s"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready"
          cat /tmp/server.log
          exit 1

      - name: Run smoke tests
        run: pnpm smoke

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: /tmp/server.log
          retention-days: 3