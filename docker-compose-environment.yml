# 乡镇小店 · 本地开发依赖
# 用法：
#   docker compose -f docker-compose-environment.yml up -d
#   docker compose -f docker-compose-environment.yml down         # 停止
#   docker compose -f docker-compose-environment.yml down -v      # 停止并清空数据
#
# 对应 .env: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/town_store?schema=public"

services:
  postgres:
    image: postgres:16-alpine
    container_name: town-store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: town_store
    ports:
      - "5432:5432"
    volumes:
      - town-store-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d town_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  town-store-postgres-data: